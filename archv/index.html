<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotion Classifier</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #1e1e2f;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    h1 {
      color: #00e0ff;
    }
    textarea {
      width: 400px;
      height: 100px;
      border-radius: 10px;
      border: none;
      padding: 10px;
      font-size: 16px;
      resize: none;
    }
    button {
      margin-top: 15px;
      padding: 10px 25px;
      font-size: 16px;
      background: #00e0ff;
      color: #1e1e2f;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #00bcd4;
    }
    .result {
      margin-top: 25px;
      padding: 15px 30px;
      font-size: 20px;
      border-radius: 10px;
      text-align: center;
      min-width: 200px;
    }
    .joy { background: #4CAF50; }       /* green */
    .anger { background: #E53935; }     /* red */
    .sadness { background: #1E88E5; }   /* blue */
    .fear { background: #8E24AA; }      /* purple */
    .disgust { background: #6D4C41; }   /* brown */
    .surprise { background: #FFC107; }  /* yellow */
    .neutral { background: #9E9E9E; }   /* grey */
  </style>
</head>
<body>
  <h1>Emotion Classification 🔍</h1>
  <textarea id="textInput" placeholder="Type your tweet or comment here..."></textarea>
  <br />
  <button onclick="predictEmotion()">Predict Emotion</button>
  <div id="result" class="result"></div>

  <script>
    async function predictEmotion() {
      const text = document.getElementById("textInput").value.trim();
      const resultDiv = document.getElementById("result");
      resultDiv.textContent = "Predicting...";
      resultDiv.className = "result";

      try {
        const response = await fetch("http://127.0.0.1:5000/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });

        const data = await response.json();
        const emotion = data.predicted_emotion;

        if (emotion) {
          resultDiv.textContent = `Predicted Emotion: ${emotion.toUpperCase()}`;
          resultDiv.classList.add(emotion.toLowerCase());
        } else {
          resultDiv.textContent = "Error: Unable to classify.";
        }
      } catch (error) {
        resultDiv.textContent = "Server not reachable 😕";
      }
    }
  </script>
</body>
</html>
